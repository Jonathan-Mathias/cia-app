<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA App · Versão Beta — Elite Migration</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;
  --surface:#1a1a27;
  --border:#2e2e44;
  --border2:#4a4a68;
  --text:#f0f0fa;
  --text2:#b8b8d4;
  --muted:#8888a8;
  --accent:#D4AF37;
  --accent2:#b8920e;
  --green:#2B5EA7;
  --green2:#1a3a6b;
  --orange:#f07a4a;
  --red:#e85555;
  --gold:#f0c44a;
  --r:14px;--r2:10px;
}
body{font-family:'Geist',sans-serif;background:var(--grad-bg);background-color:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,#D4AF3708 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px 200px}
.app{position:relative;z-index:1}
.app{max-width:520px;margin:0 auto;padding:20px 18px 80px}

/* TRILHA */
.trilha-wrap{text-align:center;padding:36px 0 32px}
.trilha-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;font-weight:600}
.trilha-h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,6vw,34px);line-height:1.2;color:var(--text);margin-bottom:12px;letter-spacing:-0.02em}
.trilha-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.7;max-width:340px;margin-left:auto;margin-right:auto}
.trilha-context{display:flex;flex-direction:column;gap:8px;margin:0 auto 28px;max-width:400px}
.trilha-proof{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:linear-gradient(135deg,#16162280 0%,#12121c80 100%);border:1px solid var(--border);border-radius:var(--r2);backdrop-filter:blur(4px)}
.trilha-proof-icon{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px}
.trilha-proof-text{font-size:13px;color:var(--text2);line-height:1.55;text-align:left}
.trilha-proof-text strong{color:var(--text);font-weight:500}
.trilha-divider{display:flex;align-items:center;gap:12px;margin:0 auto 18px;max-width:400px}
.trilha-divider::before,.trilha-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.trilha-divider-txt{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;padding:0 4px}
.trilha-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto 16px}
.trilha-btn{padding:26px 14px 20px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Geist',sans-serif;transition:all .25s cubic-bezier(.4,0,.2,1);text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;overflow:hidden}
.trilha-btn{animation:trilhaReveal .5s cubic-bezier(.34,1.2,.64,1) both}
.trilha-btn:nth-child(1){animation-delay:.1s}
.trilha-btn:nth-child(2){animation-delay:.2s}
@keyframes trilhaReveal{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.trilha-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.trilha-btn.de:hover,.trilha-btn.de.sel{border-color:#D4AF37;background:linear-gradient(160deg,#1a1500 0%,#231a00 100%);box-shadow:0 0 32px #D4AF3715,inset 0 1px 0 #D4AF3720}
.trilha-btn.au:hover,.trilha-btn.au.sel{border-color:#2B5EA7;background:linear-gradient(160deg,#0a1020 0%,#0d1830 100%);box-shadow:0 0 32px #2B5EA715,inset 0 1px 0 #2B5EA720}
.trilha-flag{width:64px;height:64px;display:flex;align-items:center;justify-content:center;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));transition:transform .25s}
.trilha-btn:hover .trilha-flag{transform:scale(1.06)}
.trilha-nome{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.trilha-btn-sub{font-size:11px;color:var(--muted);margin-top:-4px;font-family:'DM Mono',monospace;letter-spacing:0.5px}

/* PROGRESSO */
.prog-wrap{margin-bottom:28px}
.prog-meta{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px}
.prog-bar{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;transition:width .4s ease}
.prog-fill.de{background:linear-gradient(90deg,#8b6a00,#D4AF37,#f5d060);background-size:200% 100%;animation:shimmer 2s ease infinite}
.prog-fill.au{background:linear-gradient(90deg,#1a3a6b,#2B5EA7,#5b8ed4);background-size:200% 100%;animation:shimmer 2s ease infinite}

/* CARD */
.q-card{background:var(--grad-surface);border:1px solid var(--border);border-radius:var(--r);padding:26px 20px;margin-bottom:14px}
.q-text{font-size:17px;line-height:1.6;color:var(--text);margin-bottom:22px;font-weight:400;letter-spacing:-0.01em}
.q-hint{font-size:13px;color:var(--muted);margin-top:-14px;margin-bottom:20px;line-height:1.6;padding:10px 14px;background:#111120;border-radius:var(--r2);border-left:2px solid var(--border2)}

/* OPÇÕES */
.opts{display:grid;gap:9px}
.opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#111120;border:1px solid #30304a;border-radius:var(--r2);cursor:pointer;transition:border-color .2s,background .2s,transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;text-align:left;width:100%;font-family:'Geist',sans-serif;transform:translateX(0)}
.opt-key{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:#1c1c30;border:1px solid #30304a;border-radius:5px;padding:3px 8px;flex-shrink:0;min-width:28px;text-align:center;transition:all .2s;letter-spacing:0.3px}
.opt-lbl{font-size:15px;color:var(--text2);line-height:1.4;transition:color .15s}
.opt:hover{border-color:var(--border2);background:#181828;transform:translateX(3px)}
.opt:hover .opt-lbl{color:var(--text)}
.opt:active{transform:translateX(3px) scale(0.99)}
.opt.sel.de{border-color:#D4AF37;background:#1a1500}
.opt.sel.de .opt-key{background:#D4AF37;color:#0d0d00;border-color:#D4AF37}
.opt.sel.de .opt-lbl{color:var(--text);font-weight:500}
.opt.sel.au{border-color:#2B5EA7;background:#0a1020}
.opt.sel.au .opt-key{background:#2B5EA7;color:#fff;border-color:#2B5EA7}
.opt.sel.au .opt-lbl{color:var(--text);font-weight:500}

/* FAMÍLIA — só contadores */
.fam-intro{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6;padding:12px 14px;background:#111120;border-radius:var(--r2);border:1px solid var(--border)}
.fam-grid{display:grid;gap:10px}
.fam-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#111120;border:1px solid #30304a;border-radius:var(--r2)}
.fam-lbl{font-size:14px;color:var(--text);font-weight:500}
.fam-sub{font-size:12px;color:var(--muted);margin-top:3px}
.fam-ctrl{display:flex;align-items:center;gap:14px}
.fam-btn{width:34px;height:34px;border-radius:50%;border:1px solid #30304a;background:#1c1c30;color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;flex-shrink:0}
.fam-btn:hover{border-color:var(--accent);color:var(--accent);background:#0d1a30}
.fam-val{font-family:'DM Mono',monospace;font-size:20px;min-width:24px;text-align:center;color:var(--accent);font-weight:500}
.fam-total{font-size:13px;color:var(--muted);text-align:center;margin-top:12px;font-family:'DM Mono',monospace}

/* NAV */
.nav{display:flex;gap:10px;margin-top:4px}
.btn-next{flex:1;padding:15px 20px;border-radius:var(--r2);font-size:15px;font-weight:500;cursor:pointer;border:none;font-family:'Geist',sans-serif;color:#fff;transition:opacity .15s,background .15s}
.btn-next.de{background:#D4AF37;color:#0d0d00}
.btn-next.au{background:#2B5EA7;color:#fff}
.btn-next:disabled{background:#252538;color:#4a4a68;cursor:not-allowed}
.btn-back{width:48px;flex-shrink:0;padding:14px;border-radius:var(--r2);font-size:18px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Geist',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center}
.btn-back:hover{border-color:var(--border2);color:var(--text)}

/* RESULTADOS */
.res{animation:fadeUp .6s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.trilha-wrap{animation:fadeUp .5s ease both}
.q-card{animation:fadeUp .3s ease both}

.score-hero{text-align:center;padding:28px 0 20px}
.score-ring-wrap{position:relative;display:inline-block;margin-bottom:16px}
.score-ring-wrap svg{display:block}
.score-num-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-big{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;color:var(--text)}
.score-of{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:5px}
.score-band{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:500}
.score-desc{font-size:14px;color:var(--text2);max-width:320px;margin:0 auto;line-height:1.7}

/* DIMENSÕES */
.dims{display:grid;gap:10px;margin:16px 0 24px}
.dim-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.dim-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.dim-bar-name{font-size:13px;color:var(--text2);font-weight:500}
.dim-bar-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.dim-bar-score{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);font-weight:500}
.dim-bar-track{height:5px;background:#1e1e30;border-radius:3px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* BANDAS */
.bands{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:16px 0 24px}
.band{padding:10px 6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);text-align:center;transition:all .2s}
.band.act{border-width:2px;transform:translateY(-2px);background:linear-gradient(135deg,#1c1c2e 0%,#141420 100%)}
.band-name{font-size:11px;font-weight:500;margin-bottom:3px;line-height:1.2}
.band-range{font-family:'DM Mono',monospace;font-size:9px;opacity:0.5}

/* ALERTAS */
.alert-wrap{display:grid;gap:9px;margin-bottom:20px}
.alert-card{padding:14px 16px;border-radius:var(--r2);border:1px solid;display:flex;gap:12px;align-items:flex-start}
.alert-card.warn{border-color:#f0c44a50;background:#f0c44a0d}
.alert-card.danger{border-color:#e8555550;background:#e855550d}
.alert-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.alert-card.warn .alert-dot{background:var(--gold)}
.alert-card.danger .alert-dot{background:var(--red)}
.alert-text{font-size:13px;color:var(--text2);line-height:1.6}
.alert-text strong{color:var(--text);font-weight:500}

/* SEÇÃO */
.sec-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;margin-top:28px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-label-main{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;margin-top:28px;display:flex;align-items:center;gap:10px;font-weight:500}
.sec-label-main::after{content:'';flex:1;height:1px;background:var(--border)}
.collapse-toggle{background:transparent;border:1px solid var(--border);border-radius:var(--r2);color:var(--muted);font-size:12px;padding:7px 14px;cursor:pointer;font-family:'Geist',sans-serif;margin-bottom:8px;width:100%;text-align:center;transition:all .15s}
.collapse-toggle:hover{border-color:var(--border2);color:var(--text)}

/* INSIGHTS */
.ins-card{background:var(--grad-surface);border:1px solid var(--border);border-left-width:3px;border-radius:0 var(--r2) var(--r2) 0;padding:16px 18px;margin-bottom:8px;animation:insReveal .4s ease both}
@keyframes insReveal{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.ins-card:nth-child(1){animation-delay:.1s}
.ins-card:nth-child(2){animation-delay:.18s}
.ins-card:nth-child(3){animation-delay:.26s}
.ins-card:nth-child(4){animation-delay:.34s}
.ins-card:nth-child(5){animation-delay:.42s}
.ins-card:nth-child(6){animation-delay:.5s}
.ins-card:nth-child(7){animation-delay:.58s}
.ins-card:nth-child(8){animation-delay:.66s}
.ins-card.collapsed .ins-text{display:none}
.ins-card.collapsed{cursor:pointer}
.ins-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:-0.01em;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ins-title-chevron{font-size:9px;color:var(--border2);flex-shrink:0;margin-top:3px;transition:transform .2s,color .15s;opacity:0.6}
.ins-card:hover .ins-title-chevron{color:var(--muted);opacity:1}
.ins-card.collapsed .ins-title-chevron{transform:rotate(-90deg);opacity:1;color:var(--muted)}
.ins-text{font-size:13px;color:var(--text2);line-height:1.7}
.ins-text strong{color:var(--text);font-weight:600}
.ins-text a{color:var(--accent);text-decoration:none}
.ins-text a:hover{text-decoration:underline}

/* PASSOS */
.steps{display:grid;gap:8px;margin-bottom:20px}
.step{display:flex;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);align-items:flex-start}
.step-n{font-family:'DM Mono',monospace;font-size:10px;color:#D4AF37;background:#D4AF3715;border:1px solid #D4AF3730;border-radius:4px;padding:2px 7px;flex-shrink:0;margin-top:2px;letter-spacing:0.5px}
.step-t{font-size:13px;color:var(--text2);line-height:1.6}
.step-t a{color:var(--accent);text-decoration:none}

/* PROMO */
.promo{border-radius:var(--r);padding:22px;margin:14px 0}
.promo.ebook{background:linear-gradient(135deg,#071209 0%,#0c1a12 100%);border:1px solid #3ecf8e40}
.promo.curso{background:linear-gradient(135deg,#0a0d18 0%,#0f1520 100%);border:1px solid #5b9cf640}
.promo-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.promo.ebook .promo-tag{color:#3ecf8e}
.promo.curso .promo-tag{color:var(--accent)}
.promo-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text);margin-bottom:7px}
.promo-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.65}
.promo-btn{display:inline-flex;padding:10px 20px;border:none;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;text-decoration:none}
.promo.ebook .promo-btn{background:#3ecf8e;color:#071209}
.promo.curso .promo-btn{background:var(--accent);color:#fff}
.promo.curso[style*="1a1500"] .promo-btn{background:#D4AF37;color:#0d0d00}

/* SOCIAL */
.social{padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin:8px 0 16px}
.social p{font-size:13px;color:var(--text2);line-height:1.65}
.social a{color:var(--accent);text-decoration:none;font-weight:500}

/* BETA CARD */
.beta-card{background:linear-gradient(145deg,#131324 0%,#0f0f1e 100%);border:1px solid var(--border);border-radius:var(--r2);padding:18px 16px;margin:8px 0 16px}
.beta-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.beta-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.beta-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px}
.beta-sub{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.55}
.beta-form{display:grid;gap:10px}
.beta-inp{width:100%;padding:12px 14px;border:1px solid #30304a;border-radius:var(--r2);font-size:14px;color:var(--text);background:#0d0d1a;font-family:'Geist',sans-serif;outline:none;transition:border-color .15s;box-sizing:border-box}
.beta-inp:focus{border-color:var(--accent)}
.beta-inp::placeholder{color:#4a4a68}
.beta-btn{padding:13px;border:none;border-radius:var(--r2);color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:background .15s;width:100%}
.beta-btn.de{background:#D4AF37;color:#0d0d00}
.beta-btn.au{background:#2B5EA7;color:#fff}
.beta-ok{font-size:13px;color:#3ecf8e;text-align:center;padding:8px 0;display:none;font-weight:500}
.beta-err{font-size:12px;color:var(--red);text-align:center;padding:4px 0;display:none}
.beta-note{font-size:11px;color:var(--muted);text-align:center;line-height:1.5}

/* SHARE */
.share-wrap{display:grid;gap:9px;margin:8px 0 16px}
.share-btn-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;font-family:'Geist',sans-serif;transition:all .15s;width:100%}
.share-btn-row:hover{border-color:var(--border2)}
.share-btn-row.ok{border-color:#3ecf8e}
.share-lbl{font-size:14px;color:var(--text2);text-align:left}
.share-lbl.ok{color:#3ecf8e}
.share-icon{font-size:16px;opacity:0.6}
.share-beta{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:1px;background:#f0c44a15;border:1px solid #f0c44a30;border-radius:4px;padding:2px 6px}

.restart{text-align:center;padding:8px 0 4px}
.restart-btn{background:transparent;border:1px solid var(--border2);border-radius:var(--r2);color:var(--text2);font-size:13px;padding:12px 28px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .15s;width:100%}
.restart-btn:hover{border-color:var(--accent);color:var(--text);background:#5b9cf610}

@media(max-width:400px){
  .bands{grid-template-columns:repeat(2,1fr)}
  .trilha-grid{gap:10px}
  .q-text{font-size:16px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
/* =======================================================
   COLETA DE DADOS — Google Sheets via Apps Script
   -------------------------------------------------------
   CONFIGURAÇÃO (10 min):
   1. Acesse sheets.google.com e crie uma planilha chamada
      "CIA App — Dados"
   2. Crie 3 abas: "Quiz", "Cliques", "Leads"
   3. Acesse script.google.com e crie um novo projeto
   4. Cole o código do webhook (disponível na documentação)
   5. Publique como Web App (Execute as: Me, Access: Anyone)
   6. Cole a URL gerada em SHEETS_URL abaixo
   -------------------------------------------------------
   Enquanto SHEETS_URL estiver vazio, os dados ficam
   apenas no console do navegador (F12 > Console).
========================================================= */
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzs484zhRqNListUyj_85eNp0gUhYQdhbfP4AAI0PfnZxm8aQMD3KgHENo0loqxpRey4A/exec';   // cole aqui a URL do Apps Script

async function logEvent(type, data){
  const payload = {type, ts: new Date().toISOString(), ...data};
  console.log('[CIA App]', type, payload);
  if(!SHEETS_URL) return;
  // Método 1: fetch com no-cors (funciona na maioria dos browsers)
  try {
    await fetch(SHEETS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    return;
  } catch(e){ /* tenta fallback */ }
  // Método 2: fallback via GET com parâmetros (contorna CORS no iOS Safari)
  try {
    const params=encodeURIComponent(JSON.stringify(payload));
    const img=new Image();
    img.src=SHEETS_URL+'?data='+params;
  } catch(e){ console.warn('Sheets fallback error', e); }
}

/* SCORE */
function calcScore(){
  const dims={d1:{pts:0,max:0},d2:{pts:0,max:0},d3:{pts:0,max:0},d4:{pts:0,max:0}};
  const W={d1:.30,d2:.25,d3:.25,d4:.20};
  QS.forEach(q=>{
    if(!q.opts||q.familyQ) return;
    const rec=ANS[q.id];
    const v=rec?(typeof rec.v==='number'?rec.v:0):0;
    const maxV=q.opts.filter(o=>typeof o.v==='number').reduce((m,o)=>Math.max(m,o.v),0);
    if(maxV>0){dims[q.dim].pts+=v;dims[q.dim].max+=maxV;}
  });
  const tf=CTR.adultos+CTR.criancas+CTR.jovens;
  if(tf>0) dims.d2.pts=Math.max(0,dims.d2.pts-Math.min(tf*1.2,5)*0.4);
  // Bônus D2: quem já está no destino tomou a decisão e executou
  const geoPais=ANS['p_geo']?ANS['p_geo'].v:'br';
  const geoTempo=ANS['p_geo_tempo']?ANS['p_geo_tempo'].v:'';
  const noDestino=(T==='de'&&geoPais==='de')||(T==='au'&&geoPais==='au');
  if(noDestino){
    const tempoBonus={lt6m:0.5,  '6m1y':1, '1y2y':1.5, '2y5y':2, gt5y:2.5}[geoTempo]||0;
    dims.d2.pts=Math.min(dims.d2.max, dims.d2.pts+tempoBonus);
  }
  // Bônus menor: já está fora do Brasil mas em outro país (experiência internacional)
  else if(geoPais!=='br'){
    dims.d2.pts=Math.min(dims.d2.max, dims.d2.pts+0.3);
  }
  const dS={};let tot=0;
  Object.keys(dims).forEach(d=>{
    const s=dims[d].max>0?Math.round((dims[d].pts/dims[d].max)*100):0;
    dS[d]=s;tot+=s*W[d];
  });
  return{final:Math.round(Math.min(100,Math.max(0,tot))),dims:dS};
}

      const tdLocal=T==='de'?'Reconhecimento de diploma: prioridade imediata':'Status do visto: resolva isso primeiro';
      const txLocal=T==='de'
        ?'Você está na Alemanha mas ainda sem diploma reconhecido. Isso limita diretamente o acesso às vagas qualificadas. Inicie o processo de reconhecimento em <a href="https://anabin.kmk.org" target="_blank">anabin.kmk.org</a> e procure orientação no <a href="https://www.make-it-in-germany.com" target="_blank">Make it in Germany</a>.'
        :'Sua situação de visto precisa estar regularizada antes de qualquer candidatura. Consulte um agente MARA registrado: <a href="https://immi.homeaffairs.gov.au" target="_blank">immi.homeaffairs.gov.au</a>.';
      I('d2',tdLocal,'<span style="font-size:11px;color:#8888a8;display:block;margin-bottom:8px;line-height:1.5">Orientação geral, não assessoria jurídica ou de imigração. Consulte um profissional habilitado antes de tomar qualquer decisão.</span>'+txLocal);
    }
  } else if(p4<=1){
    const td=T==='de'?'Reconhecimento de diploma: comece agora':'Visto de trabalho: o caminho depende da sua área';
    const vistoArea=ANS['p3']?ANS['p3'].v:'outro';
    const vistoMsg={
      'ti': 'Para TI e tecnologia, as rotas mais comuns são a <strong>Subclass 482 (patrocínio pelo empregador)</strong> e a Subclass 189/190 (skilled independent). O caminho mais rápido costuma ser pelo patrocínio: encontrar um empregador disposto a patrocinar é o passo mais crítico do processo.',
      'eng': 'Para engenheiros, o <strong>reconhecimento pelo Engineers Australia</strong> é o primeiro passo antes de qualquer visto de habilidades. Esse processo pode levar de 3 a 6 meses e precisa ser iniciado antes da candidatura ao visto.',
      'saude': 'Para profissionais de saúde, o <strong>registro no AHPRA</strong> é obrigatório para exercer a profissão. Sem ele, nenhum empregador pode te contratar na área. Inicie esse processo antes de qualquer movimentação. Informações em <a href="https://immi.homeaffairs.gov.au" target="_blank">immi.homeaffairs.gov.au</a>.',
      'neg': 'Para gestão e negócios, a rota mais comum é via <strong>Subclass 482 (patrocínio)</strong>. Profissionais seniores com histórico documentado têm boas chances, mas o processo exige um empregador australiano como patrocinador. Saiba mais: <a href="https://immi.homeaffairs.gov.au" target="_blank">immi.homeaffairs.gov.au</a>.',
      'comex': 'Para logística e comércio exterior, a demanda é real em portos e operadores logísticos australianos. A rota mais comum é via <strong>Subclass 482</strong>, com patrocínio do empregador. Verifique se sua ocupação está na lista MLTSSL ou STSOL em <a href="https://immi.homeaffairs.gov.au" target="_blank">immi.homeaffairs.gov.au</a>.',
      'outro': 'O tipo de visto depende da sua ocupação específica. Verifique se ela consta na lista de ocupações prioritárias e consulte um agente MARA registrado: <a href="https://immi.homeaffairs.gov.au" target="_blank">immi.homeaffairs.gov.au</a>.'
    }[vistoArea]||'O tipo de visto depende da sua ocupação. Verifique as opções em <a href="https://immi.homeaffairs.gov.au" target="_blank">immi.homeaffairs.gov.au</a>.';
    const tx=T==='de'
      ?`Verifique seu diploma em <a href="https://anabin.kmk.org" target="_blank">anabin.kmk.org</a>. Diplomas sem reconhecimento automático exigem o processo de <strong>consultoria de reconhecimento (Anerkennungsberatung)</strong>, que pode levar de 6 a 18 meses. É o gargalo mais subestimado da migração qualificada.`
      :vistoMsg;
    I('d2',td,`<span style="font-size:11px;color:#8888a8;display:block;margin-bottom:8px;line-height:1.5">Orientação geral, não assessoria jurídica ou de imigração. Consulte um profissional habilitado antes de tomar qualquer decisão.</span>`+tx);
  }

  // Família e reserva
  const seguro=SEGURO_URL?` Para seguro de saúde, <a href="${SEGURO_URL}" target="_blank">confira nossa parceira recomendada</a>.`:'';
  if(!solo){
    if(T==='de'){
      let resDE='';
      if(jaNoDestino){
        resDE='Morar na Alemanha com família tem custos que muita gente subestima no dia a dia. ';
        resDE+='O <strong>aluguel quente</strong> (valor real com aquecimento, água e condomínio) é consideravelmente maior do que o aluguel base anunciado. Alugar um imóvel novo exige caução equivalente a 3 meses do aluguel base, paga na assinatura do contrato. ';
        if(CTR.criancas>0) resDE+='A <strong>creche (Kita)</strong> é subsidiada, mas os valores variam por cidade e por creche. Consulte a prefeitura local (Jugendamt) para saber os valores e filas de espera na sua região.'+seguro;
      } else {
        const aluguelFrio=' O <strong>aluguel frio</strong> é o valor base do imóvel, sem incluir aquecimento, água e condomínio. O valor real pago todo mês é o aluguel quente, sempre maior. A caução equivale a 3 meses do aluguel frio e precisa ser paga antes de entrar no imóvel.';
        resDE='A mudança com dependentes exige uma reserva financeira significativamente maior.'+aluguelFrio;
        if(CTR.criancas>0) resDE+=' A creche (Kita) é paga na Alemanha, com valores que variam de cidade para cidade e de creche para creche: consulte a prefeitura local (Jugendamt).'+seguro;
        resDE+=' Veja como calcular: <a href="'+EBOOK_URL+'" target="_blank">Reserva Estratégica Alemanha</a>.';
      }
      I('d2','Reserva financeira: custos reais de viver na Alemanha com família',resDE);
    } else {
      let resAU=jaNoDestino?'Você já está aqui, então sabe na prática o que isso significa. Mas alguns custos surpreendem mesmo quem já mora na Austrália.<br><br>':'A Austrália é um dos países mais caros para morar com família, e o planejamento financeiro precisa ser detalhado antes de qualquer decisão.<br><br>';
      resAU+='<strong>Aluguel</strong> é o maior gasto. Em regiões metropolitanas como Sydney, Melbourne, Brisbane e Perth, um apartamento de 2 quartos custa entre AUD 2.800 e AUD 5.000 por mês. A caução exigida na entrada costuma equivaler a 4 semanas de aluguel, pagas antes de receber a chave.<br><br>';
      if(CTR.criancas>0) resAU+='<strong>Child care (creche)</strong> para crianças de 0 a 5 anos custa em média entre AUD 150 e AUD 250 por dia em Sydney. Quem ainda não tem residência permanente geralmente não tem acesso ao subsídio governamental (CCS) e paga o valor integral, o que representa um dos maiores impactos no orçamento familiar nos primeiros anos.<br><br>';
      resAU+='<strong>Saúde</strong> é outro ponto crítico. Quem não é cidadão ou residente permanente não tem acesso ao Medicare (sistema público de saúde). Dependendo do tipo de visto, é obrigatório contratar seguro de saúde privado, o que representa um custo mensal real e recorrente'+(SEGURO_URL?' &mdash; <a href="'+SEGURO_URL+'" target="_blank">veja opções recomendadas</a>':'')+'.<br><br>';
      const areaEstudos=ANS['p3']&&ANS['p3'].v==='estudos';
      if(areaEstudos) resAU+='Para estudantes, use a calculadora oficial do governo australiano para estimar seus custos reais por cidade: <a href="https://costofliving.studyaustralia.gov.au/" target="_blank">costofliving.studyaustralia.gov.au</a>.';
      I('d2','Reserva financeira: o custo real de morar na Austrália com família',resAU);
    }
  } else {
    if(T==='de'){
      const af=' Lembre que o <strong>aluguel frio</strong> é apenas o valor base do imóvel: o valor real inclui aquecimento, água e condomínio (aluguel quente), além de 3 meses de caução antes de entrar no imóvel.';
      I('d2','Reserva financeira: planejamento antes de qualquer movimento','Mesmo indo sozinho, a transição envolve custos além do óbvio: visto, passagem, instalação e o período até o primeiro salário.'+af+seguro);
    } else {
      const areaEstudosSolo=ANS['p3']&&ANS['p3'].v==='estudos';
      const calcLink=areaEstudosSolo?' Para estudantes, estime seus custos em: <a href="https://costofliving.studyaustralia.gov.au/" target="_blank">costofliving.studyaustralia.gov.au</a>.':'';
      I('d2','Reserva financeira: planejamento antes de qualquer movimento','Mesmo indo sozinho, a Austrália exige uma reserva sólida. O aluguel em regiões metropolitanas é alto, o Medicare não está disponível para todos os vistos, e o período até o primeiro salário pode se estender mais do que o esperado.'+calcLink);
    }
  }
  if(CTR.criancas>0){
    if(T==='de') I('familia','Creche (Kita): inscreva-se antes de chegar','A creche na Alemanha tem listas de espera de <strong>6 a 18 meses</strong> em grandes cidades. Inscreva seu filho assim que tiver endereço confirmado. Os valores variam de cidade para cidade: consulte a prefeitura local (Jugendamt).');
    else I('familia','Child care na Austrália: sem garantia de vaga',`Os custos financeiros foram detalhados acima. Além do aspecto financeiro, <strong>a demanda por vagas em child care é alta</strong> e a espera pode chegar a meses nas grandes cidades. Coloque seu filho na lista de espera assim que tiver um endereço confirmado na Austrália, e se possível ainda antes de chegar. Procure centros próximos ao seu local de trabalho ou residência e cadastre-se em mais de um.`);
  }
  if(CTR.jovens>0&&T==='de')   I('familia','Escola obrigatória: a adaptação começa na chegada','A escola é obrigatória na Alemanha e pode iniciar semanas após a chegada. Jovens sem Alemão são encaminhados a <strong>classes de integração (DaZ)</strong> antes de entrar na turma regular.');
  if(result.dims.d3<50){
    const inv3=ANS['p9']?ANS['p9'].v:0;
    let d3txt='Até agora, a preparação está no campo das intenções. <strong>O primeiro investimento concreto muda a qualidade da decisão.</strong> Quem investe, pesquisa diferente. Quem pesquisa diferente, decide melhor.';
    // Pitch micro-contextual: só aparece se não investiu nada e há produto disponível
    if((inv3===0||inv3==='0')&&T==='de'){
      d3txt+=' Uma forma prática de dar esse primeiro passo é o guia <a href="'+EBOOK_URL+'" target="_blank">#partiu_Alemanha</a>, que cobre o processo completo de forma direta e sem romantismo.';
    }
    I('d3','Comprometimento: a lacuna entre intenção e ação',d3txt);
  }
  if(result.dims.d4<50){
    const appsLnk=[
      APP_CV_URL?`<a href="${APP_CV_URL}" target="_blank">currículo</a>`:'currículo',
      APP_CARTA_URL?`<a href="${APP_CARTA_URL}" target="_blank">carta de apresentação</a>`:'carta de apresentação',
      APP_LI_URL?`<a href="${APP_LI_URL}" target="_blank">LinkedIn</a>`:'LinkedIn'
    ].join(', ');
    const inv4=ANS['p9']?ANS['p9'].v:0;
    let d4txt=`Entender o processo seletivo ${T==='de'?'alemão':'australiano'} é o que separa candidaturas ignoradas de entrevistas marcadas. O formato de ${appsLnk} tem diferenças reais em relação ao padrão brasileiro: ignorá-las é o erro mais comum de profissionais qualificados.`;
    // Quando já investiu em algo mas ainda tem gap de mercado: pitch de upgrade
    if((inv4===1||inv4==='1')&&T==='de'&&result.final>=41){
      d4txt+=` O curso <a href="${CURSO_URL}" target="_blank">Emprego na Alemanha</a> foi desenvolvido exatamente para fechar esse gap com exemplos reais e validados por recrutadores alemães.`;
    }
    I('d4','Posicionamento: a diferença começa antes da candidatura',d4txt);
  }
  // DAMA: insight para trilha AU em perfis intermediários com flexibilidade de localização
  // DAMA e insight local: só para quem ainda não está no destino
  if(!jaNoDestino && T==='au' && sc>=41 && sc<=85 && area!=='saude'){
    const soloOuCasal=CTR.criancas===0&&CTR.jovens===0;
    const damaTexto=soloOuCasal
      ?`Uma rota subestimada por brasileiros são os <strong>DAMAs (Designated Area Migration Agreements)</strong>: acordos entre o governo federal e regiões australianas com escassez de mão de obra qualificada. A vantagem é que algumas ocupações que não estão nas listas nacionais de habilidades podem ser patrocinadas via DAMA, com exigências de inglês e experiência frequentemente menores. A contrapartida é que a pessoa precisa morar e trabalhar na região designada por um período. Para quem tem flexibilidade de localização, pode ser uma porta de entrada mais acessível do que as rotas das grandes capitais. Veja os acordos ativos: <a href="https://immi.homeaffairs.gov.au/visas/working-in-australia/regional-migration/designated-area-migration-agreements" target="_blank">immi.homeaffairs.gov.au/dama</a>.`
      :`Uma rota que vale conhecer são os <strong>DAMAs (Designated Area Migration Agreements)</strong>: acordos entre o governo federal e regiões com escassez de mão de obra, onde algumas ocupações fora das listas nacionais podem ser patrocinadas com critérios mais acessíveis. Para famílias, a condição de residir na região designada precisa ser avaliada com cuidado, mas em regiões como o Northern Territory ou South Australia regional a qualidade de vida pode surpreender positivamente. Veja os acordos ativos: <a href="https://immi.homeaffairs.gov.au/visas/working-in-australia/regional-migration/designated-area-migration-agreements" target="_blank">immi.homeaffairs.gov.au/dama</a>.`;
    I('d2','DAMA: uma rota de imigração subestimada por brasileiros',damaTexto);
  }
  // Insight exclusivo para quem já está no destino
  if(jaNoDestino){
    const tempoBonusLabel={'lt6m':'menos de 6 meses','6m1y':'entre 6 meses e 1 ano','1y2y':'entre 1 e 2 anos','2y5y':'entre 2 e 5 anos','gt5y':'mais de 5 anos'}[tempoFora]||'algum tempo';
    const posLocal=T==='de'
      ?`Você está na Alemanha há ${tempoBonusLabel}. O diferencial agora não é mais se preparar para ir: é <strong>como você aparece para recrutadores locais</strong>. LinkedIn em alemão otimizado para o mercado local, currículo no formato currículo (Lebenslauf) e candidaturas direcionadas às empresas certas são os três movimentos que mudam o resultado de quem já está lá.`
      :`Você está na Austrália há ${tempoBonusLabel}. O diferencial agora é <strong>visibilidade no mercado local</strong>. Perfil no LinkedIn otimizado para recrutadores australianos, resume no padrão anglo-saxônico e uma rede de contatos ativa localmente são o que separa quem consegue emprego em semanas de quem leva meses.`;
    I('d2','Você já está lá: foco em posicionamento local',posLocal);
  }

  if(sc<=40){
    const inv40=ANS['p9']?ANS['p9'].v:0;
    let g40=jaNoDestino
      ?`Você já deu o passo mais difícil. Mas estar no país não garante emprego na área: a transição profissional exige uma camada adicional de preparação que muitos subestimam. Identifique o principal gap entre as quatro dimensões e trate como prioridade única nos próximos 60 dias.`
      :`Sua pontuação indica que uma mudança imediata <strong>aumenta consideravelmente o risco de fracasso</strong>. O problema raramente é falta de talento: é falta de preparação estratégica. Dependendo do seu ponto de partida, 12 a 24 meses de preparação focada é o horizonte realista para uma entrada bem posicionada.${refId}`;
    if((inv40===0||inv40==='0')&&T==='de'){
      g40+=' Quem começa com clareza sobre o processo chega mais rápido. O guia <a href="'+EBOOK_URL+'" target="_blank">#partiu_Alemanha</a> é o ponto de partida mais direto para entender o que realmente está à sua frente.';
    }
    I('geral','Perspectiva geral: construa a base antes de migrar',g40);
  }
  else if(sc>=86) I('geral','Perspectiva geral: você está pronto para agir',`Sua pontuação está <strong>entre as mais competitivas</strong> desta avaliação. Nesse nível, o que separa quem consegue em semanas de quem demora meses não é mais preparação técnica: é visibilidade. Um perfil no LinkedIn otimizado para recrutadores ${T==='de'?'alemães':'australianos'}, uma rede de contatos ativa no destino e candidaturas direcionadas às empresas certas são os três movimentos que restam. Execute um por vez, com intenção.`);
  else if(sc>=66){
    const ingBom=T==='au'&&en>=2;
    const alBom=T==='de'&&typeof al==='number'&&al>=2;
    const idiomaOk=ingBom||alBom;
    const gap66=idiomaOk
      ?'posicionamento e visibilidade no mercado-alvo'
      :'idioma ou posicionamento';
    const foco66=idiomaOk
      ?`Seu idioma já não é o obstáculo. O que vai fazer a diferença agora é <strong>como você aparece para recrutadores antes de candidatar</strong>: LinkedIn otimizado para o mercado ${T==='de'?'alemão':'australiano'}, rede de contatos ativa no destino e um currículo que comunica valor internacional, não apenas experiência local. Escolha um desses três e execute com foco nos próximos 90 dias.`
      :`Você está na direção certa. Escolha <strong>um único gap para os próximos 90 dias</strong> e execute com foco. Corrija primeiro o ${gap66} e o nível de competitividade sobe de forma significativa.`;
    I('geral','Perspectiva geral: refine e avance',foco66);
  }
  else            I('geral','Perspectiva geral: ajuste fino antes do salto',`Você está na direção certa. <strong>Identifique o principal gap entre as quatro dimensões</strong> e trate como prioridade única. ${jaNoDestino?'Quem já está no destino com o perfil certo não precisa de meses: precisa de foco nas ações certas.':'Foco e consistência nos próximos meses separam quem chega posicionado de quem chega recomeçando do zero.'}`);
  return R;
}

/* PRÓXIMOS PASSOS */
function getSteps(result){
  const sc=result.final;
  const en=ANS['p1']?ANS['p1'].v:0;
  const al=ANS['p2']?ANS['p2'].v:0;
  const inglesInsuf=T==='au'&&en<=1;
  const alemaoInsuf=T==='de'&&typeof al==='number'&&al<2;
  const cursol=CURSO_ALEMAO
    ?`<a href="${CURSO_ALEMAO}" target="_blank">Invista num curso de alemão estruturado</a> e defina B2 como meta`
    :'Invista num curso de alemão estruturado e defina B2 como meta';
  const appsPkg=`${APP_CV_URL?`<a href="${APP_CV_URL}" target="_blank">currículo</a>`:'currículo'}, ${APP_CARTA_URL?`<a href="${APP_CARTA_URL}" target="_blank">carta de apresentação</a>`:'carta de apresentação'} e ${APP_LI_URL?`<a href="${APP_LI_URL}" target="_blank">LinkedIn</a>`:'LinkedIn'} no padrão ${T==='de'?'alemão':'australiano'}`;
  const liStep=APP_LI_URL
    ?`Otimize seu perfil no LinkedIn para recrutadores ${T==='de'?'alemães':'australianos'}: <a href="${APP_LI_URL}" target="_blank">ajuste headline, resumo e experiências</a> com palavras-chave do mercado local`
    :`Otimize seu perfil no LinkedIn para recrutadores ${T==='de'?'alemães':'australianos'}: ajuste headline, resumo e experiências com palavras-chave do mercado local`;
  const idiomaDE=`Priorize o Alemão antes de qualquer outra ação: ${cursol}. Sem B1 iniciado, a maioria das candidaturas não passa da triagem inicial`;
  const idiomaAU='Priorize o Inglês antes de qualquer outra ação: fluência é o pré-requisito absoluto na Austrália. Sem isso, currículo, visto e networking têm impacto mínimo';

  // Passos para DE
  if(T==='de'){
    // Versão para quem já está na Alemanha
    if(isNoDestino()) return[
      alemaoInsuf?idiomaDE:`Otimize seu LinkedIn e currículo alemão (Lebenslauf) para recrutadores alemães: formato, idioma e palavras-chave corretas${APP_CV_URL?' — <a href="'+APP_CV_URL+'" target="_blank">use nosso otimizador de currículo</a>':''}`,
      `Prepare sua pacote de candidatura (Bewerbungsmappe) completa: ${appsPkg}`,
      'Explore vagas em <a href="https://www.make-it-in-germany.com" target="_blank">Make it in Germany</a>, <a href="https://www.stepstone.de" target="_blank">StepStone</a> e LinkedIn Alemanha com filtros por cidade e área'
    ];
    if(sc<=40) return[
      alemaoInsuf?idiomaDE:'Verifique seu diploma em <a href="https://anabin.kmk.org" target="_blank">anabin.kmk.org</a> e inicie o processo de reconhecimento o quanto antes',
      alemaoInsuf?'Verifique seu diploma em <a href="https://anabin.kmk.org" target="_blank">anabin.kmk.org</a> em paralelo com o desenvolvimento do idioma':'Defina uma única prioridade para os próximos 90 dias e execute sem dispersão',
      'Construa uma rede de contatos com brasileiros que já estão na Alemanha na sua área: essa rede vai encurtar seu caminho mais do que qualquer curso'
    ];
    if(sc<=65) return[
      alemaoInsuf?idiomaDE:'Verifique seu diploma em <a href="https://anabin.kmk.org" target="_blank">anabin.kmk.org</a> e avance no processo de reconhecimento',
      `Prepare seu pacote de candidatura: ${appsPkg}`,
      liStep
    ];
    if(sc<=85) return[
      `Prepare seu pacote de candidatura: ${appsPkg}`,
      liStep,
      'Explore vagas em <a href="https://www.make-it-in-germany.com" target="_blank">Make it in Germany</a> e verifique se você se enquadra no Chancenkarte'
    ];
    return[
      'Comece a aplicar agora: seu perfil está entre os mais competitivos no mercado alemão',
      `Prepare seu pacote de candidatura: ${appsPkg}`,
      liStep
    ];
  }

  // Passos para AU
  // Versão para quem já está na Austrália
  if(isNoDestino()) return[
    inglesInsuf?idiomaAU:`Otimize seu perfil no LinkedIn para recrutadores australianos: headline, resumo e experiências com palavras-chave do mercado local${APP_LI_URL?' — <a href="'+APP_LI_URL+'" target="_blank">use nosso otimizador</a>':''}`,
    `Prepare seu pacote de candidatura no padrão australiano: ${appsPkg}`,
    'Construa uma rede de contatos ativa localmente: conecte-se com profissionais da sua área na Austrália no LinkedIn e participe de eventos e meetups na sua cidade'
  ];

  // Passos para AU — quem ainda não está lá
  if(sc<=40) return[
    inglesInsuf?idiomaAU:`Inicie o processo de visto com um agente de imigração registrado (MARA agent). Em paralelo, pesquise empresas que já têm acordos de patrocínio aprovados: <a href="https://immi.homeaffairs.gov.au/visas/employing-and-sponsoring-someone/labour-agreements/list-of-current-labour-agreements" target="_blank">lista de empresas patrocinadoras</a>`,
    inglesInsuf?`Inicie o processo de visto em paralelo com o Inglês: consulte um agente MARA registrado e pesquise empresas patrocinadoras em <a href="https://immi.homeaffairs.gov.au/visas/employing-and-sponsoring-someone/labour-agreements/list-of-current-labour-agreements" target="_blank">immi.homeaffairs.gov.au</a>`:`Construa uma rede de contatos com brasileiros que já estão na Austrália na sua área`,
    'Construa uma rede de contatos com brasileiros que já estão na Austrália na sua área: essa rede vai encurtar seu caminho mais do que qualquer pesquisa isolada'
  ];
  if(sc<=65) return[
    inglesInsuf?idiomaAU:`Inicie o processo de visto com um agente de imigração registrado (MARA agent). Em paralelo, pesquise empresas que já têm acordos de patrocínio aprovados: <a href="https://immi.homeaffairs.gov.au/visas/employing-and-sponsoring-someone/labour-agreements/list-of-current-labour-agreements" target="_blank">lista de empresas patrocinadoras</a>`,
    `Prepare seu pacote de candidatura: ${appsPkg}`,
    liStep
  ];
  if(sc<=85) return[
    `Inicie o processo de visto com um agente de imigração registrado (MARA agent). Em paralelo, pesquise empresas que já têm acordos de patrocínio aprovados: <a href="https://immi.homeaffairs.gov.au/visas/employing-and-sponsoring-someone/labour-agreements/list-of-current-labour-agreements" target="_blank">lista de empresas patrocinadoras</a>`,
    `Prepare seu pacote de candidatura: ${appsPkg}`,
    liStep
  ];
  return[
    'Comece a aplicar agora: seu perfil está entre os mais competitivos para o mercado australiano',
    `Prepare seu pacote de candidatura: ${appsPkg}`,
    liStep
  ];
}

function buildSummary(result,insights,steps){
  const b=getBand(result.final),a=ANS,tf=CTR.adultos+CTR.criancas+CTR.jovens;
  const dest=T==='de'?'Alemanha':'Austrália';
  const lines=[];
  lines.push('Career Intelligence Assessment — Elite Migration');
  lines.push('Trilha: '+dest);
  lines.push('');
  lines.push('Pontuação: '+result.final+'/100 — '+b.lb);
  lines.push(b.desc);
  lines.push('');
  lines.push('Área: '+(a['p3']?a['p3'].l:'não informado'));
  lines.push((T==='de'?'Alemão':'Inglês')+': '+(a['p2']?a['p2'].l:'não informado'));
  lines.push('Prazo: '+(a['p8']?a['p8'].l:'não informado'));
  if(tf>0) lines.push('Dependentes: '+tf+' pessoa'+(tf!==1?'s':''));
  lines.push('');
  lines.push('Pontuação por dimensão:');
  lines.push('  Idioma e área: '+result.dims.d1+'/100');
  lines.push('  Maturidade da decisão: '+result.dims.d2+'/100');
  lines.push('  Perfil comportamental: '+result.dims.d3+'/100');
  lines.push('  Conhecimento do mercado: '+result.dims.d4+'/100');
  if(insights&&insights.length){
    lines.push('');
    lines.push('Análise:');
    insights.forEach(i=>{
      const txt=i.text.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ').trim();
      lines.push('• '+i.title);
      lines.push('  '+txt.substring(0,180)+(txt.length>180?'...':''));
    });
  }
  if(steps&&steps.length){
    lines.push('');
    lines.push('Próximos passos:');
    steps.forEach((s,i)=>{
      const txt=s.replace(/<[^>]+>/g,'').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ').trim();
      lines.push((i+1)+'. '+txt);
    });
  }
  lines.push('');
  // Sem link e sem hashtags no relatório copiado
  return lines.join('\n');
}

function getVisible(){
  const tf=CTR.adultos+CTR.criancas+CTR.jovens;
  const geoPais=ANS['p_geo']?ANS['p_geo'].v:'br';
  return QS.filter(q=>{
    if(q.conditional==='p5_notSolo') return tf>0;
    if(q.conditional==='p_geo_notBR') return geoPais!=='br';
    return true;
  });
}

    const totalEl=document.createElement('div');totalEl.className='fam-total';totalEl.id='fam-total';
    const tf=CTR.adultos+CTR.criancas+CTR.jovens;
    totalEl.textContent=tf>0?`${tf} dependente${tf>1?'s':''} informado${tf>1?'s':''}`:'';
    card.appendChild(totalEl);
  } else if(q.selectQ){
    // Dropdown nativo
    const wrap=document.createElement('div');wrap.style.cssText='position:relative';
    const sel=document.createElement('select');
    sel.id='sel-'+q.id;
    sel.style.cssText='width:100%;padding:14px 40px 14px 16px;border:1px solid #30304a;border-radius:var(--r2);font-size:15px;color:var(--text);background:#111120;font-family:Geist,sans-serif;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border-color .2s';
    const placeholder=document.createElement('option');
    placeholder.value='';placeholder.textContent=q.placeholder||'Selecione...';placeholder.disabled=true;
    const currentVal=ANS[q.id]?ANS[q.id].v:'';
    placeholder.selected=!currentVal;
    sel.appendChild(placeholder);
    q.selectOpts.forEach(o=>{
      const opt=document.createElement('option');
      opt.value=o.v;opt.textContent=o.l;
      if(currentVal===o.v) opt.selected=true;
      sel.appendChild(opt);
    });
    const arrow=document.createElement('span');
    arrow.style.cssText='position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:12px';
    arrow.textContent='▼';
    wrap.appendChild(sel);wrap.appendChild(arrow);
    card.appendChild(wrap);
    sel.addEventListener('change',()=>{
      const v=sel.value;
      const l=q.selectOpts.find(o=>o.v===v)?.l||v;
      ANS[q.id]={v,l};
      sel.style.borderColor=T==='de'?'#D4AF37':'#2B5EA7';
      // Atualizar GEO se for pergunta geográfica
      if(q.id==='p_geo') GEO.pais=v;
      if(q.id==='p_geo_tempo') GEO.tempo=v;
      // Auto-avançar após breve delay para dar feedback visual
      setTimeout(()=>{
        if(!isLast){step++;renderQ();window.scrollTo(0,0);}
        else{const nb=document.getElementById('btn-next');if(nb)nb.disabled=false;}
      },300);
    });
  } else {
    const od=document.createElement('div');od.className='opts';
    q.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt'+(ANS[q.id]&&ANS[q.id].v===o.v?' sel '+T:'');
      b.innerHTML=`<span class="opt-key">${keys[i]}</span><span class="opt-lbl">${o.l}</span>`;
      b.addEventListener('click',()=>{

        else{const nb=document.getElementById('btn-next');if(nb)nb.disabled=false;}

    // Dois botões: Continuar sozinho e Confirmar com dependentes
    const btnSolo=document.createElement('button');btnSolo.className=`btn-next ${T}`;
    btnSolo.style.background='var(--border2)';btnSolo.style.color='var(--text)';
    btnSolo.textContent='Continuar sozinho(a)';
    btnSolo.addEventListener('click',()=>{
      ANS['p5']={v:'solo',l:'Sozinho(a)'};CTR={adultos:0,criancas:0,jovens:0};
      step++;renderQ();window.scrollTo(0,0);
    });
    const btnDep=document.createElement('button');btnDep.className=`btn-next ${T}`;btnDep.id='btn-dep';
    btnDep.textContent='Confirmar dependentes';
    const tf2=CTR.adultos+CTR.criancas+CTR.jovens;
    btnDep.style.display=tf2>0?'block':'none';
    btnDep.addEventListener('click',()=>{
      ANS['p5']={v:'familia',l:'Com dependentes'};
      step++;renderQ();window.scrollTo(0,0);
    });
    nav.appendChild(btnSolo);nav.appendChild(btnDep);
  } else if(isLast){
    const nx=document.createElement('button');nx.id='btn-next';nx.className=`btn-next ${T}`;
    nx.textContent='Ver minha pontuação';nx.disabled=!ANS[q.id];
    nx.addEventListener('click',()=>{if(!ANS[q.id])return;renderResults();window.scrollTo(0,0);});
    nav.appendChild(nx);
  }
  wrap.appendChild(nav);
  app.innerHTML='';app.appendChild(wrap);

  if(q.familyQ){
    q.ctrs.forEach(ct=>{
      const minus=document.getElementById('fm-'+ct.k),plus=document.getElementById('fp-'+ct.k),valEl=document.getElementById('fv-'+ct.k);
      const update=()=>{
        if(valEl)valEl.textContent=CTR[ct.k];
        const tf=CTR.adultos+CTR.criancas+CTR.jovens;
        const tot=document.getElementById('fam-total');
        if(tot)tot.textContent=tf>0?`${tf} dependente${tf>1?'s':''} informado${tf>1?'s':''}`:'';
        const bd=document.getElementById('btn-dep');if(bd)bd.style.display=tf>0?'block':'none';
      };
      if(minus)minus.addEventListener('click',()=>{CTR[ct.k]=Math.max(0,CTR[ct.k]-1);update();});
      if(plus) plus.addEventListener('click',()=>{CTR[ct.k]++;update();});
    });
  }
}

    const npsPular=document.createElement('button');
    npsPular.textContent='Pular';
    npsPular.style.cssText='background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:Geist,sans-serif;display:block;width:100%;text-align:center;padding:6px;margin-top:4px';
    npsPular.addEventListener('click',()=>{
      const thanks=document.getElementById('nps-thanks');
      if(thanks){thanks.textContent='Avaliação ignorada.';thanks.style.display='block';}
      npsConfirm.style.display='none';npsPular.style.display='none';
      npsGrid.querySelectorAll('button').forEach(b=>b.disabled=true);
    });

    if(npsBlock){npsBlock.appendChild(npsConfirm);npsBlock.appendChild(npsPular);}

    for(let i=0;i<=10;i++){
      const btn=document.createElement('button');
      btn.textContent=i;
      btn.style.cssText='padding:13px 0;border-radius:var(--r2);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:14px;font-family:DM Mono,monospace;font-weight:500;cursor:pointer;transition:all .2s';
      btn.addEventListener('click',()=>{
        NPS=i;
        // Highlight seleção, botões permanecem ativos para trocar nota
        npsGrid.querySelectorAll('button').forEach(b=>{
          const v=+b.textContent;
          const isSel=v===i;
          const col=v<=6?'#e85555':v<=8?'#f0c44a':'#3ecf8e';
          b.style.background=isSel?col:'var(--surface)';
          b.style.color=isSel?'#fff':'var(--text2)';
          b.style.borderColor=isSel?col:'var(--border)';
          b.style.transform=isSel?'scale(1.08)':'scale(1)';
        });
        npsConfirm.style.display='block';
        npsPular.style.display='none';
        const cw=document.getElementById('nps-comment-wrap');
        if(cw)cw.style.display='block';
      });
      npsGrid.appendChild(btn);
    }
  }

  // Toggle de todos os insights
  let allCollapsed=false;
  const toggleAllBtn=document.getElementById('toggle-all-insights');
  if(toggleAllBtn){
    toggleAllBtn.addEventListener('click',()=>{
      const allCards=document.querySelectorAll('.ins-card');
      allCollapsed=!allCollapsed;
      allCards.forEach(c=>{
        if(allCollapsed) c.classList.add('collapsed');
        else c.classList.remove('collapsed');
      });
      toggleAllBtn.textContent=allCollapsed?'Expandir tudo':'Recolher tudo';
    });
  }

  // Colapso individual — só cards com chevron
  document.querySelectorAll('.ins-card').forEach(card=>{
    const chevron=card.querySelector('.ins-title-chevron');
    if(!chevron) return;
    card.style.cursor='pointer';
    card.title='Clique para expandir ou recolher';
    card.addEventListener('click',()=>{
      card.classList.toggle('collapsed');
    });
  });

  // Botão expandir grupo D2
  const expandBtn=document.getElementById('expand-all');
  if(expandBtn){
    expandBtn.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.ins-card.collapsed').forEach(c=>c.classList.remove('collapsed'));
      expandBtn.style.display='none';
    });
  }

  document.getElementById('btn-restart').addEventListener('click',()=>{
    T='';QS=[];step=0;ANS={};CTR={adultos:0,criancas:0,jovens:0};NPS=null;LEAD={nome:'',email:'',waDDI:'55',waNum:''};GEO={pais:'',tempo:''};
    renderTrilha();window.scrollTo(0,0);
  });
}

renderTrilha();
</script>
</body>
</html>
